name: Crisp
options:
  bundleIdPrefix: com.aayush
  deploymentTarget:
    macOS: "26.0"
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    ARCHS: arm64
targets:
  Crisp:
    type: application
    platform: macOS
    sources:
      - path: Crisp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aayush.crisp
        INFOPLIST_FILE: Crisp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Crisp/Crisp.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 4538W4A79B
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
